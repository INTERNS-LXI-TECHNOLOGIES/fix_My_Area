<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixMyArea - Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}
h2 {
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
button {
    width: 100%;
    padding: 10px;
    background: #06b6d4;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
a {
    color: #06b6d4;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <p style="text-align:center;">
        Don't have an account?
        <a href="register.html">Register</a>
    </p>
</div>

</body>
</html>
